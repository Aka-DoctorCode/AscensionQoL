      #     gh api repos/Aka-DoctorCode/AscensionSuit/dispatches \
      #       --method POST \
      #       -f event_type="update-suite" \
      #       -F client_payload[trigger]="AscensionQoL" \
      #       -F client_payload[version]="${{ github.ref_name }}"